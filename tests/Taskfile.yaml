version: "3"

vars:
  TEST_DIR: "tests"

env:
  PYTHONIOENCODING: "utf-8"
  PYTHONUTF8: "1"

tasks:
  test:
    desc: Run all packaging tests in parallel
    deps:
      - test:self
      - test:editable
      - test:external
      - test:workspace
      - test:group
      - test:extra

  # ---- Generic test ----

  test:*:
    desc: Generic test setup
    dir: "{{.TEST_DIR}}"
    vars:
      FOLDER: "{{index .MATCH 0}}"
      CLEAN_PS: >
        powershell -NoProfile -Command 'if (Test-Path "{{.FOLDER}}") { Remove-Item -Recurse -Force "{{.FOLDER}}"}'
      CLEAN_SH: >
        rm -rf {{.FOLDER}}
    cmds:
      - '{{if eq OS "windows"}}{{.CLEAN_PS}}{{else}}{{.CLEAN_SH}}{{end}}'
      - task: setup:{{.FOLDER}}
        vars:
          FOLDER: "{{.FOLDER}}"

  pack:*:
    desc: Generic pack and unpack
    dir: "{{.TEST_DIR}}"
    vars:
      FOLDER: "{{index .MATCH 0}}"
      IMPORTS_CMD: '{{.IMPORTS | default ""}}'
      UNPACK_PS: >
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        '$env:BASE_PY = (uv --directory {{.FOLDER}} python find); & .\{{.FOLDER}}\pack\unpack.ps1'
      UNPACK_SH: >
        BASE_PY="$(uv --directory {{.FOLDER}} python find)" sh {{.FOLDER}}/pack/unpack.sh
      VERIFY_PS: >
        powershell -NoProfile -Command ''& ".\{{.FOLDER}}\pack\.venv\Scripts\python.exe" -c "{{.IMPORTS_CMD}}"
      VERIFY_SH: >
        {{.FOLDER}}/pack/.venv/bin/python -c "{{.IMPORTS_CMD}}"
    cmds:
      - uv --directory {{.FOLDER}} run --with ../.. uv-pack --skip python {{.ARGS | default ""}}
      - '{{if eq OS "windows"}}{{.UNPACK_PS}}{{else}}{{.UNPACK_SH}}{{end}}'
      - '{{if eq OS "windows"}}{{.VERIFY_PS}}{{else}}{{.VERIFY_SH}}{{end}}'

  # ---- Test definitions ----

  setup:self:
    dir: "{{.TEST_DIR}}"
    internal: true
    cmds:
      - uv init {{.FOLDER}} --package --no-workspace
      - task: "pack:{{.FOLDER}}"
        vars:
          IMPORTS: "import self"

  setup:editable:
    dir: "{{.TEST_DIR}}"
    internal: true
    cmds:
      - uv init {{.FOLDER}} --bare --no-workspace
      - uv --directory {{.FOLDER}} init a --package --no-workspace
      - uv --directory {{.FOLDER}} add --editable ./a --no-workspace
      - task: "pack:{{.FOLDER}}"
        vars:
          IMPORTS: "import a"

  setup:external:
    dir: "{{.TEST_DIR}}"
    internal: true
    cmds:
      - uv init {{.FOLDER}} --bare --no-workspace
      - uv --directory {{.FOLDER}} add parse
      - task: "pack:{{.FOLDER}}"
        vars:
          IMPORTS: "import parse"

  setup:workspace:
    dir: "{{.TEST_DIR}}"
    internal: true
    cmds:
      - uv init {{.FOLDER}} --bare --no-workspace
      - uv --directory {{.FOLDER}} init a --package
      - uv --directory {{.FOLDER}} init b --package
      - uv --directory {{.FOLDER}} init c --package
      - uv --directory {{.FOLDER}} add --package a b
      - uv --directory {{.FOLDER}} add --package b c
      - task: "pack:{{.FOLDER}}"
        vars:
          ARGS: '--uv-export "--package a"'
          IMPORTS: "import c"

  setup:group:
    dir: "{{.TEST_DIR}}"
    internal: true
    cmds:
      - uv init {{.FOLDER}} --bare --no-workspace
      - uv --directory {{.FOLDER}} init a --package --no-workspace
      - uv --directory {{.FOLDER}} add ./a --group extra --no-workspace
      - uv --directory {{.FOLDER}} add parse --group extra
      - task: "pack:{{.FOLDER}}"
        vars:
          ARGS: '--uv-export "--group extra"'
          IMPORTS: "import parse; import a"

  setup:extra:
    dir: "{{.TEST_DIR}}"
    internal: true
    cmds:
      - uv init {{.FOLDER}} --bare --no-workspace
      - uv --directory {{.FOLDER}} init a --package --no-workspace
      - uv --directory {{.FOLDER}} add ./a --optional extra --no-workspace
      - uv --directory {{.FOLDER}} add parse --optional extra
      - task: "pack:{{.FOLDER}}"
        vars:
          ARGS: '--uv-export "--extra extra"'
          IMPORTS: "import parse; import a"
