version: "3"

vars:
    SOURCES: src

includes:
    tests: ./tests/Taskfile.yaml

tasks:
    pre-commit-install:
        cmd: uv run pre-commit install

    pre-commit-all:
        cmd: uv run pre-commit run --all-files

    lint:
        desc: "Check code formatting and linting issues using Black and Ruff."
        cmds:
            - uv run ruff check  --config pyproject.toml
            - uv run black --diff --check --config pyproject.toml {{.SOURCES}}

    safety:
        cmds:
            - uv run bandit -ll --recursive {{.SOURCES}}

    format:
        desc: "Format code using Black and fix linting issues with Ruff."
        cmds:
            - uv run ruff check --config pyproject.toml --fix
            - uv run black --config pyproject.toml {{.SOURCES}}

    typing:
        desc: "Perform type checking."
        cmd: uv run pyright

    typing-quality:
        desc: "Check type completeness of the external fastsort API."
        cmd: uv run pyright --ignoreexternal --verifytypes uv_pack

    test:
        desc: "Create a pack and unpack it using platform scripts. Set SYSTEM_PYTHON=true to test with VENV_DIR empty using a disposable base venv."
        vars:
            SYSTEM_PYTHON: '{{.SYSTEM_PYTHON | default "false"}}'
        cmds:
            - 'uv run --isolated --no-editable --refresh uv-pack{{if eq .SYSTEM_PYTHON "true"}} --skip python{{end}}'
            - task: unpack-posix
              vars:
                SYSTEM_PYTHON: "{{.SYSTEM_PYTHON}}"
            - task: unpack-windows
              vars:
                SYSTEM_PYTHON: "{{.SYSTEM_PYTHON}}"

    unpack-posix:
        desc: "Create a pack and unpack it using the POSIX script."
        platforms: [linux, darwin]
        vars:
            SYSTEM_PYTHON: '{{.SYSTEM_PYTHON | default "false"}}'
            BASE_TEST_DIR: ./pack/.base-test
            BASE_PY: '{{.BASE_TEST_DIR}}/bin/python'
        cmds:
            - '{{if eq .SYSTEM_PYTHON "true"}}sh -c ''uv venv --clear {{.BASE_TEST_DIR}}; BASE_PY={{.BASE_PY}}; export BASE_PY; VENV_DIR="" sh ./pack/unpack.sh''{{else}}sh ./pack/unpack.sh{{end}}'
            - '{{if eq .SYSTEM_PYTHON "true"}}{{.BASE_PY}}{{else}}./pack/.venv/bin/python{{end}} -c "import typer;"'

    unpack-windows:
        desc: "Create a pack and unpack it using PowerShell and CMD."
        platforms: [windows]
        vars:
            SYSTEM_PYTHON: '{{.SYSTEM_PYTHON | default "false"}}'
        cmds:
            - task: unpack-windows-ps1
              vars:
                SYSTEM_PYTHON: "{{.SYSTEM_PYTHON}}"
            - '{{if ne .SYSTEM_PYTHON "true"}}powershell -NoProfile -Command "Remove-Item -Path ''.\pack\.venv'',''.\pack\.python'' -Recurse -Force"{{end}}'
            - task: unpack-windows-cmd
              vars:
                SYSTEM_PYTHON: "{{.SYSTEM_PYTHON}}"

    unpack-windows-ps1:
        desc: "Create a pack and unpack it using PowerShell."
        platforms: [windows]
        vars:
            SYSTEM_PYTHON: '{{.SYSTEM_PYTHON | default "false"}}'
            BASE_TEST_DIR: .\pack\.base-test
            BASE_PY: '{{.BASE_TEST_DIR}}\Scripts\python.exe'
            VENV_PY: .\pack\.venv\Scripts\python.exe
        cmds:
            - >-
              powershell -NoProfile {{if eq .SYSTEM_PYTHON "true"}} -Command "uv venv --clear {{.BASE_TEST_DIR}} | Out-Null; $env:BASE_PY = '{{.BASE_PY}}'; $env:VENV_DIR = ''; & '.\\pack\\unpack.ps1'; & $env:BASE_PY -c 'import typer;'"{{else}} -ExecutionPolicy Bypass -File .\\pack\\unpack.ps1{{end}}
            - >-
              powershell -NoProfile -Command "& {{if eq .SYSTEM_PYTHON "true"}}{{.BASE_PY}}{{else}}{{.VENV_PY}}{{end}} -c 'import typer;'"

    unpack-windows-cmd:
        desc: "Create a pack and unpack it using CMD."
        platforms: [windows]
        vars:
            SYSTEM_PYTHON: '{{.SYSTEM_PYTHON | default "false"}}'
            BASE_TEST_DIR: .\pack\.base-test
            BASE_PY: '{{.BASE_TEST_DIR}}\Scripts\python.exe'
            VENV_PY: .\\pack\\.venv\\Scripts\\python.exe
        cmds:
            - '{{if eq .SYSTEM_PYTHON "true"}}cmd /v:on /c "uv venv --clear {{.BASE_TEST_DIR}} & set \"BASE_PY={{.BASE_PY}}\" & set \"VENV_DIR=\" & .\\pack\\unpack.cmd & \"!BASE_PY!\" -c \"import typer;\""{{else}}cmd /c .\\pack\\unpack.cmd{{end}}'
            - 'cmd /c {{if eq .SYSTEM_PYTHON "true"}}{{.BASE_PY}}{{else}}{{.VENV_PY}}{{end}} -c "import typer;"'

    check:
        desc: "Run a linting, type checking, and tests."
        cmds:
            - task: lint
            - task: typing
            - task: test
            - task: test
              vars:
                SYSTEM_PYTHON: true

    setup:
        desc: "Setup the uv environment"
        cmd: uv sync --frozen

    build:
        desc: "Build the package to /dist"
        cmd: uv build

    publish:
        desc: "Publish the built package from /dist"
        cmd: uv publish
